

[tool.ruff]
# Включаем автоисправление
fix = true

# Игнорируем определенные папки
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    ".idea",
]

# Выбор наборов правил
select = [
    "E", # Ошибки форматирования (лишние строки, пустые строки, ...)
    "F", # Логические ошибки (неиспользуемые импорты/переменные, неопределенные имена)
    "I", # Сортировка импортов (порядок, группировка)
    "N", # Соглашения об именах (переменные, функции, классы в правильном регистре)
    "W", # Предупреждения о стиле (табуляция, лишние пробелы в конце строк)
    # "D", # Соблюдение стандартов docstring
    "B", # Поиск багов и потециальных проблем
    "S", # Проверка безопасности
    "ASYNC", # Асинхронное программирование
    "LOG", # Проверка правильности использования логирования
    "G", # Формат строк логирования
]

# Игнорируемы некоторые ошибки
ignore = [
    "E501"
]

# Максимальная длина строки
line-length = 88

# Настройки сортировки импортов
[tool.ruff.isort]
known-first-party = ["MyImpessionBot"]

# Настройки форматирования
[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
